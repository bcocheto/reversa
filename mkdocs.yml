site_name: AgentForge
site_url: https://bcocheto.github.io/agentforge
site_description: Crie, organize, evolua e compile a camada agent-ready de um projeto.
site_author: bcocheto
repo_url: https://github.com/bcocheto/agentforge
repo_name: bcocheto/agentforge
edit_uri: edit/main/docs/
copyright: '"AgentForge" by bcocheto'

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    logo: material/magnify

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - pt
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
        - locale: pt
          name: Português
          build: true
          nav_translations:
            Home: Início
            Why AgentForge: Por que o AgentForge
            Installation: Instalação
            How to use: Como usar
            CLI: CLI
            Configuration: Configuração
            Supported engines: Engines suportadas
            Lifecycle: Ciclo de vida
            Confidence scale: Escala de confiança
            Agents: Agentes
            Overview: Visão geral
            Guide with analogies: Guia com analogias
            AgentForge (Orchestrator): AgentForge (Orquestrador)
            Generated outputs: Saídas geradas
            Developing from specs: Desenvolvendo com as specs
            Contributing: Contribuindo
            Legacy: Legado
            Historical context: Contexto histórico
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Why AgentForge: Por qué AgentForge
            Installation: Instalación
            How to use: Cómo usar
            CLI: CLI
            Configuration: Configuración
            Supported engines: Motores compatibles
            Lifecycle: Ciclo de vida
            Confidence scale: Escala de confianza
            Agents: Agentes
            Overview: Visión general
            Guide with analogies: Guía con analogías
            AgentForge (Orchestrator): AgentForge (Orquestador)
            Generated outputs: Salidas generadas
            Developing from specs: Desarrollando con las specs
            Contributing: Contribuir
            Legacy: Legado
            Historical context: Contexto histórico

nav:
  - Home: index.md
  - Why AgentForge: por-que-agentforge.md
  - Installation: instalacao.md
  - How to use: uso.md
  - CLI: cli.md
  - Configuration: configuracao.md
  - Supported engines: engines.md
  - Lifecycle: pipeline.md
  - Confidence scale: escala-confianca.md
  - Agents:
      - Overview: agentes/index.md
      - Guide with analogies: agentes/agents-help.md
      - AgentForge (Orchestrator): agentes/agentforge.md
      - Scout: agentes/scout.md
      - Archaeologist: agentes/arqueologo.md
      - Detective: agentes/detetive.md
      - Architect: agentes/arquiteto.md
      - Writer: agentes/redator.md
      - Reviewer: agentes/revisor.md
      - Visor: agentes/visor.md
      - Data Master: agentes/data-master.md
      - Design System: agentes/design-system.md
  - Generated outputs: saidas/index.md
  - Developing from specs: desenvolvendo-com-specs.md
  - Contributing: contribuindo.md
  - Legacy:
      - Historical context: por-que-reversa.md
