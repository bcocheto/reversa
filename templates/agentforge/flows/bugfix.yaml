id: bugfix
name: bugfix
goal: Corrigir um defeito com mínimo de alteração e máxima rastreabilidade.
trigger: Quando houver um erro, regressão ou comportamento incorreto.
steps:
  - id: triage
    name: Triagem
    agent: orchestrator
    description: Confirmar sintoma e severidade.
  - id: diagnosis
    name: Diagnóstico
    agent: engineer
    description: Identificar a causa provável e corrigir com a menor mudança possível.
  - id: validation
    name: Validação
    agent: reviewer
    description: Verificar regressões e efeitos colaterais.
checkpoints:
  - Causa identificada
  - Correção aplicada
  - Regressão verificada
done_when:
  - O defeito não aparece mais e o impacto foi validado.
