version: 1
discovery:
  label: Discovery
  purpose: Explorar o problema, levantar contexto e identificar superfícies relevantes.
  use_when:
    - A tarefa ainda está ampla ou pouco definida.
    - É preciso reunir contexto antes de projetar a mudança.
agent-design:
  label: Agent Design
  purpose: Definir ou ajustar agentes, sugestões e memória associada.
  use_when:
    - O trabalho altera agentes ou superfícies de sugestão.
    - É necessário preparar agentes para uma nova capacidade.
flow-design:
  label: Flow Design
  purpose: Definir ou ajustar fluxos de execução e o mapa de contexto correspondente.
  use_when:
    - O trabalho altera fluxos de trabalho.
    - É necessário sincronizar o context-map com os fluxos.
policies:
  label: Policies
  purpose: Definir regras de segurança, escrita e aprovação.
  use_when:
    - O trabalho altera políticas ou restrições.
    - É necessário revisar superfícies protegidas.
export:
  label: Export
  purpose: Gerar ou atualizar entrypoints e artefatos de exportação.
  use_when:
    - O trabalho precisa publicar superfícies canônicas.
    - É necessário atualizar entrypoints do produto.
review:
  label: Review
  purpose: Inspecionar mudanças e reduzir risco antes de integrar.
  use_when:
    - O foco é avaliar, não implementar.
    - O trabalho precisa de checagem de regressão e clareza.
adopt:
  label: Adopt
  purpose: Planejar ou aplicar a adoção agentic do repositório.
  use_when:
    - O projeto existente precisa migrar para AgentForge.
    - É necessário preservar legado e migrar para superfícies canônicas.
feature:
  label: Feature
  purpose: Entregar uma nova capacidade ou expansão de comportamento.
  use_when:
    - O usuário pediu algo novo.
    - O trabalho precisa de descoberta, design, implementação e validação.
bugfix:
  label: Bugfix
  purpose: Corrigir um defeito reproduzível com a menor mudança segura.
  use_when:
    - O comportamento está quebrado ou inconsistente.
    - A causa raiz pode ser isolada.
refactor:
  label: Refactor
  purpose: Melhorar a estrutura sem alterar o comportamento esperado.
  use_when:
    - O código está difícil de manter.
    - A mudança deve preservar o contrato atual.
context-curation:
  label: Context Curation
  purpose: Organizar e localizar contexto durável por tema, arquivo e linha.
  use_when:
    - usuário pede organização de contexto
    - usuário pede segregação de glossário
    - usuário pede localizar boas práticas por arquivo/linha
    - refactor-context gera muitos unclassified
    - context-map tem muitos itens needs-review
documentation:
  label: Documentation
  purpose: Atualizar instruções e documentação sem alterar o comportamento do produto.
  use_when:
    - O trabalho é de explicação, orientação ou catálogo.
    - Apenas documentação ou instruções precisam mudar.
