version: 2
always_load:
  - harness/router.md
  - harness/context-index.yaml
  - harness/context-map.yaml
  - harness/task-modes.yaml
  - harness/load-order.yaml
  - harness/engine-map.yaml
  - ai/README.md
items:
  - id: context-map
    path: harness/context-map.yaml
    purpose: Mapa granular de contexto com arquivos, ranges e estado de curadoria.
  - id: ai-readme
    path: ai/README.md
    purpose: Guia da camada AI-engine driven e da execução por handoff.
  - id: ai-playbooks-discovery
    path: ai/playbooks/discovery.md
    purpose: Playbook da fase discovery para a IA ativa.
  - id: ai-playbooks-agent-design
    path: ai/playbooks/agent-design.md
    purpose: Playbook da fase agent-design para a IA ativa.
  - id: ai-playbooks-flow-design
    path: ai/playbooks/flow-design.md
    purpose: Playbook da fase flow-design para a IA ativa.
  - id: ai-playbooks-policies
    path: ai/playbooks/policies.md
    purpose: Playbook da fase policies para a IA ativa.
  - id: ai-playbooks-export
    path: ai/playbooks/export.md
    purpose: Playbook da fase export para a IA ativa.
  - id: ai-playbooks-review
    path: ai/playbooks/review.md
    purpose: Playbook da fase review para a IA ativa.
  - id: ai-playbooks-task-execution
    path: ai/playbooks/task-execution.md
    purpose: Playbook para executar tarefas com julgamento contextual.
  - id: project-overview
    path: context/project-overview.md
    purpose: Visão geral do projeto, objetivo e público.
  - id: architecture
    path: context/architecture.md
    purpose: Componentes, fronteiras e fluxo principal.
  - id: conventions
    path: context/conventions.md
    purpose: Convenções de nomes, pastas e organização.
  - id: coding-standards
    path: context/coding-standards.md
    purpose: Padrões de código e revisão.
  - id: testing
    path: context/testing.md
    purpose: Estratégia de testes e comandos úteis.
  - id: deployment
    path: context/deployment.md
    purpose: Como publicar e reverter mudanças.
  - id: glossary
    path: context/glossary.md
    purpose: Termos recorrentes do projeto.
  - id: unclassified
    path: context/unclassified.md
    purpose: Trechos importados que ainda não têm confiança suficiente para outra categoria.
skills:
  - id: run-tests
    path: skills/run-tests/SKILL.md
    purpose: Executar a suíte e interpretar os resultados.
  - id: review-changes
    path: skills/review-changes/SKILL.md
    purpose: Revisar mudanças com foco em risco e regressão.
  - id: create-implementation-plan
    path: skills/create-implementation-plan/SKILL.md
    purpose: Transformar uma solicitação em um plano de execução curto.
flows:
  - id: feature-development
    path: flows/feature-development.md
    purpose: Entregar uma nova capacidade com descoberta, design, implementação e revisão.
  - id: bugfix
    path: flows/bugfix.md
    purpose: Corrigir um problema reproduzível com escopo mínimo.
  - id: refactor
    path: flows/refactor.md
    purpose: Melhorar a estrutura sem alterar o comportamento esperado.
  - id: review
    path: flows/review.md
    purpose: Revisar mudanças antes da integração.
  - id: context-curation
    path: flows/context-curation.md
    purpose: Organizar, revisar e indexar contexto durável do projeto.
  - id: release
    path: flows/release.md
    purpose: Promover uma entrega segura e rastreavel.
task_contexts:
  discovery:
    context:
      - context/project-overview.md
      - context/architecture.md
      - context/conventions.md
    references:
      - references/commands.md
      - references/important-files.md
    reports:
      - reports/
  agent-design:
    agents:
      - agents/
    suggestions:
      - suggestions/agents/
    memory:
      - memory/
    reports:
      - reports/
  flow-design:
    flows:
      - flows/
    always_load:
      - harness/context-index.yaml
    memory:
      - memory/
    reports:
      - reports/
  policies:
    policies:
      - policies/
    always_load:
      - harness/context-index.yaml
    reports:
      - reports/
  export:
    entrypoints:
      - AGENTS.md
      - CLAUDE.md
      - .cursor/rules/agentforge.md
      - .github/copilot-instructions.md
    reports:
      - reports/
  review:
    reports:
      - reports/
  adopt:
    entrypoints:
      - AGENTS.md
      - CLAUDE.md
    legacy:
      - .agents/
    context:
      - .agentforge/context/
    skills:
      - .agentforge/skills/
    flows:
      - .agentforge/flows/
    policies:
      - .agentforge/policies/
    references:
      - .agentforge/references/
    always_load:
      - harness/context-index.yaml
      - harness/context-map.yaml
    reports:
      - reports/
  feature:
    context:
      - context/project-overview.md
      - context/architecture.md
      - context/coding-standards.md
    skills:
      - skills/create-implementation-plan/SKILL.md
      - skills/run-tests/SKILL.md
    flows:
      - flows/feature-development.md
    policies:
      - policies/protected-files.md
      - policies/human-approval.md
  bugfix:
    context:
      - context/project-overview.md
      - context/testing.md
    skills:
      - skills/run-tests/SKILL.md
    flows:
      - flows/bugfix.md
    policies:
      - policies/protected-files.md
  refactor:
    context:
      - context/architecture.md
      - context/conventions.md
    skills:
      - skills/create-implementation-plan/SKILL.md
    flows:
      - flows/refactor.md
    policies:
      - policies/protected-files.md
  context-curation:
    always_load:
      - harness/context-index.yaml
      - harness/context-map.yaml
    context:
      - context/project-overview.md
      - context/architecture.md
      - context/glossary.md
      - context/coding-standards.md
    references:
      - references/commands.md
      - references/important-files.md
    flows:
      - flows/context-curation.md
    policies:
      - policies/protected-files.md
      - policies/human-approval.md
  documentation:
    context:
      - context/conventions.md
      - context/glossary.md
    skills:
      - skills/create-implementation-plan/SKILL.md
    references:
      - references/commands.md
      - references/important-files.md
      - references/tools.md
