# AgentForge — Configuração do projeto
# Gerenciado pelo instalador. Personalizações individuais devem ficar em config.user.toml.

[project]
name = "{{PROJECT_NAME}}"
version = "{{VERSION}}"

[user]
name = "{{USER_NAME}}"
chat_language = "{{CHAT_LANGUAGE}}"
doc_language = "{{DOC_LANGUAGE}}"

[output]
folder = "{{OUTPUT_FOLDER}}"

[engines]
installed = {{ENGINE_ARRAY}}

[internal_agents]
installed = {{INTERNAL_AGENT_ARRAY}}

[generated_agents]
items = {{GENERATED_AGENT_ARRAY}}

[generated_subagents]
items = {{GENERATED_SUBAGENT_ARRAY}}

[flows]
items = {{FLOW_ARRAY}}

[analysis]
response_mode = "{{RESPONSE_MODE}}"
detail_level = "{{DETAIL_LEVEL}}"
memory_policy = "{{MEMORY_POLICY}}"
review_policy = "{{REVIEW_POLICY}}"
